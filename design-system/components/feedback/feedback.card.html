<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel" src="../../ds-runtime.js"></script>
<style>
  body { padding: 28px; background: var(--surface-page); }
  .wrap { display: grid; grid-template-columns: 1.2fr 1fr; gap: 28px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Callout, StepList } = window.IADaCasaDesignSystem_449ba5;
  function Demo() {
    return (
      <div className="wrap">
        <div className="stack">
          <Callout variant="ai" title="Dica do copiloto">
            Preparei um passo a passo pra montar sua Ficha Técnica. Você pode ajustar qualquer parte.
          </Callout>
          <Callout variant="warning" title="Atenção ao custo">
            Alguns ingredientes estão sem preço. Isso afeta o cálculo da margem.
          </Callout>
          <Callout variant="success" title="Tudo certo">
            Sua receita do sistema está pronta para ser montada.
          </Callout>
        </div>
        <StepList steps={[
          { title: 'Escolher módulo', status: 'done' },
          { title: 'Responder o questionário', status: 'done' },
          { title: 'Revisar regras de negócio', status: 'current', description: 'Confirme como o sistema deve funcionar.' },
          { title: 'Receber a Receita do Sistema', status: 'upcoming' },
        ]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
