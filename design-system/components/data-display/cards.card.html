<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../../ds-runtime.js"></script>
<style>
  body { padding: 28px; background: var(--surface-page); }
  .lbl { font: var(--fw-semibold) var(--fs-overline)/1 var(--font-sans); letter-spacing: var(--ls-overline); text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 22px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, Badge, Avatar } = window.IADaCasaDesignSystem_449ba5;
  function Demo() {
    return (
      <div>
        <p className="lbl">Badges</p>
        <div className="row">
          <Badge variant="success" dot>Pronto</Badge>
          <Badge variant="brand">3 módulos</Badge>
          <Badge variant="accent" tone="solid">Novo</Badge>
          <Badge variant="warning">Em revisão</Badge>
          <Badge variant="danger">Atrasado</Badge>
          <Badge variant="neutral" tone="outline">Rascunho</Badge>
        </div>
        <p className="lbl">Avatars</p>
        <div className="row">
          <Avatar name="Bar do Zé" color="terracotta" size="lg" />
          <Avatar name="Maria Silva" size="md" />
          <Avatar name="Pizzaria Nona" color="wine" size="md" />
          <Avatar name="AI" color="accent" size="sm" />
        </div>
        <p className="lbl">Cards</p>
        <div className="cards">
          <Card padding="md" interactive>
            <h4 style={{marginBottom:6}}>Ficha Técnica</h4>
            <p style={{margin:0, color:'var(--text-muted)', fontSize:14}}>Padronize fichas e calcule o custo de cada prato.</p>
          </Card>
          <Card padding="md" inverse>
            <h4 style={{marginBottom:6}}>Receita do Sistema</h4>
            <p style={{margin:0, color:'var(--green-200)', fontSize:14}}>Seu plano de implementação, pronto para montar.</p>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
