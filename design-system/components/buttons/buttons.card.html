<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel" src="../../ds-runtime.js"></script>
<style>
  body { padding: 28px; background: var(--surface-page); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 16px; }
  .lbl { font: var(--fw-semibold) var(--fs-overline)/1 var(--font-sans); letter-spacing: var(--ls-overline); text-transform: uppercase; color: var(--text-muted); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button } = window.IADaCasaDesignSystem_449ba5;
  const Ic = (n) => <i data-lucide={n}></i>;
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Variants</span>
          <Button variant="primary">Montar sistema</Button>
          <Button variant="accent">Ver receita</Button>
          <Button variant="secondary">Voltar</Button>
          <Button variant="ghost">Pular etapa</Button>
          <Button variant="danger">Excluir módulo</Button>
        </div>
        <div className="row">
          <span className="lbl">Sizes & icons</span>
          <Button size="sm" variant="secondary" leftIcon={Ic('plus')}>Adicionar</Button>
          <Button size="md" rightIcon={Ic('arrow-right')}>Continuar</Button>
          <Button size="lg" variant="accent" leftIcon={Ic('sparkles')}>Gerar com IA</Button>
          <Button variant="primary" disabled>Indisponível</Button>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
