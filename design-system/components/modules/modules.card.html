<!-- @dsCard group="Components" viewport="700x520" name="ModuleCard — cardápio de soluções" subtitle="The signature solution card, color-coded per module, selectable" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel" src="../../ds-runtime.js"></script>
<style>
  body { padding: 28px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { ModuleCard } = window.IADaCasaDesignSystem_449ba5;
  const clock = (t) => <><i data-lucide="clock"></i> {t}</>;
  function Demo() {
    return (
      <div className="grid">
        <ModuleCard accent="ficha" icon="clipboard-list" title="Ficha Técnica"
          description="Padronize fichas e calcule o custo real de cada prato." meta={clock('~5 min')} selected />
        <ModuleCard accent="receitas" icon="cooking-pot" title="Receitas"
          description="Centralize o modo de preparo e mantenha o padrão da casa." meta={clock('~6 min')} />
        <ModuleCard accent="estoque" icon="package" title="Estoque"
          description="Saiba o que tem, o que falta e o que está vencendo." meta={clock('~7 min')} />
        <ModuleCard accent="compras" icon="shopping-cart" title="Compras"
          description="Liste o que comprar com base no consumo real." meta={clock('~5 min')} />
        <ModuleCard accent="checklist" icon="list-checks" title="Checklist"
          description="Rotinas de abertura e fechamento sem esquecer nada." meta={clock('~4 min')} />
        <ModuleCard accent="financeiro" icon="wallet" title="Financeiro"
          description="Controle entradas, saídas e o caixa do dia." status="soon" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
