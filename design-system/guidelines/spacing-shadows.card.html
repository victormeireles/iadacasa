<!-- @dsCard group="Spacing" viewport="700x180" name="Elevação — sombras quentes" subtitle="Soft, warm-tinted shadows — never hard black" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .box { width: 110px; height: 84px; background: var(--surface-card); border-radius: var(--radius-lg); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; }
  .box span { font: var(--fw-medium) 11px var(--font-mono); color: var(--text-muted); }
</style></head>
<body>
  <div class="box" style="box-shadow:var(--shadow-xs)"><span>xs</span></div>
  <div class="box" style="box-shadow:var(--shadow-sm)"><span>sm</span></div>
  <div class="box" style="box-shadow:var(--shadow-md)"><span>md</span></div>
  <div class="box" style="box-shadow:var(--shadow-lg)"><span>lg</span></div>
  <div class="box" style="box-shadow:var(--shadow-xl)"><span>xl</span></div>
</body></html>
