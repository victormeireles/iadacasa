<!-- @dsCard group="Spacing" viewport="700x180" name="Escala de espaçamento" subtitle="4px base grid — --space-1 … --space-12" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 28px; background: var(--surface-card); display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .tag { width: 130px; font: var(--fw-medium) 11px var(--font-mono); color: var(--text-muted); flex: none; }
  .bar { height: 16px; background: var(--brand); border-radius: 3px; }
</style></head>
<body>
  <div class="row"><span class="tag">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tag">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tag">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tag">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tag">--space-7 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tag">--space-9 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tag">--space-10 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tag">--space-12 · 96</span><div class="bar" style="width:96px"></div></div>
</body></html>
