<!-- @dsCard group="Colors" viewport="700x150" name="Neutros — creme & grafite" subtitle="Warm cream surfaces and warm graphite text — never pure white/black" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }
  .sw { flex: 1; height: 52px; display: flex; align-items: flex-end; padding: 6px; }
  .sw span { font: var(--fw-medium) 10px var(--font-mono); }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--cream-50)"><span>cream-50</span></div>
    <div class="sw" style="background:var(--cream-100)"><span>100</span></div>
    <div class="sw" style="background:var(--cream-200)"><span>200</span></div>
    <div class="sw" style="background:var(--cream-300)"><span>300</span></div>
    <div class="sw" style="background:var(--cream-400)"><span>400</span></div>
    <div class="sw" style="background:var(--paper)"><span>paper</span></div>
  </div>
  <div class="row">
    <div class="sw" style="background:var(--graphite-900)"><span style="color:#fff">900</span></div>
    <div class="sw" style="background:var(--graphite-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--graphite-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--graphite-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--graphite-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--graphite-300)"><span style="color:var(--graphite-900)">300</span></div>
  </div>
</body></html>
