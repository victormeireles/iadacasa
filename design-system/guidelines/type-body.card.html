<!-- @dsCard group="Type" viewport="700x210" name="Texto & UI — Hanken Grotesk" subtitle="Body, small, caption & overline label" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); display: flex; flex-direction: column; gap: 12px; max-width: 560px; }
  .overline { font: var(--fw-semibold) var(--fs-overline) var(--font-sans); letter-spacing: var(--ls-overline); text-transform: uppercase; color: var(--text-muted); }
  .lg { font-size: var(--fs-body-lg); color: var(--text-body); line-height: var(--lh-body); }
  .base { font-size: var(--fs-body); color: var(--text-body); line-height: var(--lh-body); }
  .sm { font-size: var(--fs-body-sm); color: var(--text-muted); }
  .cap { font-size: var(--fs-caption); color: var(--text-faint); }
</style></head>
<body>
  <p class="overline">Passo 2 de 4</p>
  <p class="lg">Texto grande (18) — para introduções e respostas do copiloto.</p>
  <p class="base">Texto padrão (16) — corpo principal da interface. Claro, direto e humano, como uma conversa na cozinha.</p>
  <p class="sm">Texto pequeno (14) — apoios e descrições secundárias.</p>
  <p class="cap">Caption (13) — metadados, dicas e legendas.</p>
</body></html>
