<!-- @dsCard group="Colors" viewport="700x210" name="Accents — gastronômicos" subtitle="Mustard/gold, terracotta, wine & sage — the supporting family" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); display: flex; flex-direction: column; gap: 10px; }
  .fam { display: flex; align-items: center; gap: 14px; }
  .fam .name { width: 110px; font: var(--fw-semibold) 13px var(--font-sans); color: var(--text-strong); }
  .strip { flex: 1; display: flex; gap: 0; border-radius: var(--radius-sm); overflow: hidden; }
  .sw { flex: 1; height: 38px; display: flex; align-items: center; padding-left: 10px; }
  .sw span { font: var(--fw-medium) 11px var(--font-mono); }
</style></head>
<body>
  <div class="fam"><div class="name">Mostarda</div><div class="strip">
    <div class="sw" style="background:var(--mustard-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--mustard-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--mustard-300)"><span style="color:var(--mustard-700)">300</span></div>
    <div class="sw" style="background:var(--mustard-100)"><span style="color:var(--mustard-700)">100</span></div>
  </div></div>
  <div class="fam"><div class="name">Terracota</div><div class="strip">
    <div class="sw" style="background:var(--terracotta-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--terracotta-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--terracotta-300)"><span style="color:var(--terracotta-700)">300</span></div>
    <div class="sw" style="background:var(--terracotta-100)"><span style="color:var(--terracotta-700)">100</span></div>
  </div></div>
  <div class="fam"><div class="name">Vinho</div><div class="strip">
    <div class="sw" style="background:var(--wine-800)"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--wine-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--wine-300)"><span style="color:var(--wine-800)">300</span></div>
    <div class="sw" style="background:var(--wine-100)"><span style="color:var(--wine-800)">100</span></div>
  </div></div>
  <div class="fam"><div class="name">Sálvia</div><div class="strip">
    <div class="sw" style="background:var(--sage-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--sage-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--sage-300)"><span style="color:var(--green-900)">300</span></div>
    <div class="sw" style="background:var(--sage-100)"><span style="color:var(--green-900)">100</span></div>
  </div></div>
</body></html>
