<!-- @dsCard group="Spacing" viewport="700x170" name="Cantos arredondados" subtitle="Generous, friendly radii — sm … 2xl + pill" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
  .box { width: 88px; height: 78px; background: var(--brand-soft); border: 1.5px solid var(--green-300); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; }
  .box span { font: var(--fw-medium) 11px var(--font-mono); color: var(--green-800); }
</style></head>
<body>
  <div class="box" style="border-radius:var(--radius-sm)"><span>sm 10</span></div>
  <div class="box" style="border-radius:var(--radius-md)"><span>md 14</span></div>
  <div class="box" style="border-radius:var(--radius-lg)"><span>lg 18</span></div>
  <div class="box" style="border-radius:var(--radius-xl)"><span>xl 26</span></div>
  <div class="box" style="border-radius:var(--radius-2xl)"><span>2xl 36</span></div>
  <div class="box" style="border-radius:var(--radius-pill)"><span>pill</span></div>
</body></html>
