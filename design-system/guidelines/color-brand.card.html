<!-- @dsCard group="Colors" viewport="700x150" name="Brand — verde escuro" subtitle="Primary herb-green scale · --brand = green-700" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .sw span { font: var(--fw-semibold) 12px var(--font-mono); }
  .sw small { font: var(--fw-regular) 11px var(--font-mono); opacity: .8; }
  .light span, .light small { color: #fff; }
  .dark span, .dark small { color: var(--green-900); }
</style></head>
<body>
<div class="row">
  <div class="sw light" style="background:var(--green-900)"><span>900</span></div>
  <div class="sw light" style="background:var(--green-800)"><span>800</span></div>
  <div class="sw light" style="background:var(--green-700)"><span>700</span><small>brand</small></div>
  <div class="sw light" style="background:var(--green-600)"><span>600</span></div>
  <div class="sw light" style="background:var(--green-500)"><span>500</span></div>
  <div class="sw dark" style="background:var(--green-300)"><span>300</span></div>
  <div class="sw dark" style="background:var(--green-200)"><span>200</span></div>
  <div class="sw dark" style="background:var(--green-100)"><span>100</span></div>
  <div class="sw dark" style="background:var(--green-50)"><span>50</span></div>
</div>
</body></html>
